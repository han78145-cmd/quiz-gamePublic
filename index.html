<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 종목 초성 퀴즈</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f6fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .hidden { display: none; }
        h1 { color: #333; margin-bottom: 1rem; font-size: 1.5rem; }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: bold;
            color: #666;
        }

        .quiz-box {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 8px;
            margin: 1.5rem 0;
            color: var(--primary-color);
            background: #f0f4f8;
            padding: 20px;
            border-radius: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
            outline: none;
            text-align: center;
        }

        input[type="text"].correct { border-color: var(--success-color); background-color: #e8f8f0; }
        input[type="text"].wrong { border-color: var(--error-color); background-color: #fdeaea; }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled { background-color: #ccc; }

        .feedback { height: 1.5rem; margin-bottom: 1rem; font-weight: bold; }

        .ranking-list { text-align: left; margin: 1.5rem 0; padding: 0; }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 1.1rem;
        }
        .ranking-item:first-child { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 시작 화면 -->
    <div id="start-screen">
        <h1>운동 종목 초성 퀴즈</h1>
        <p>10문제를 모두 맞춰보세요!</p>
        <button onclick="startGame()">게임 시작</button>
    </div>

    <!-- 2. 게임 화면 -->
    <div id="game-screen" class="hidden">
        <div class="info-bar">
            <span id="progress">1/10</span>
            <span id="current-score">점수: 0</span>
        </div>
        <div class="quiz-box" id="choseong-display"></div>
        <div class="feedback" id="feedback-msg"></div>
        <input type="text" id="answer-input" placeholder="정답을 입력하세요" autocomplete="off">
        <button onclick="checkAnswer()">확인</button>
    </div>

    <!-- 3. 결과/저장 화면 -->
    <div id="result-screen" class="hidden">
        <h1>게임 종료!</h1>
        <p style="font-size: 1.2rem;">나의 최종 점수: <span id="final-score" style="color:var(--primary-color); font-weight:bold;">0</span>점</p>
        <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요">
        <button id="save-btn" onclick="saveScore()">점수 저장 및 랭킹 보기</button>
    </div>

    <!-- 4. 랭킹 화면 -->
    <div id="ranking-screen" class="hidden">
        <h2>실시간 TOP 5 랭킹</h2>
        <div id="ranking-board" class="ranking-list"></div>
        <button onclick="location.reload()">다시 시작하기</button>
    </div>
</div>

<script type="module">
    // Firebase SDK v10 CDN 임포트
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 사용자 제공 설정값
    const firebaseConfig = {
        apiKey: "AIzaSyBRDOlEpX5SAhaVp9_E5B1KL69DIK7KmHo",
        authDomain: "gimjihan-7a49b.firebaseapp.com",
        projectId: "gimjihan-7a49b",
        storageBucket: "gimjihan-7a49b.firebasestorage.app",
        messagingSenderId: "479102564269",
        appId: "1:479102564269:web:195f8caafaa342f5cf5324",
        measurementId: "G-CC8K1F75N1"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // 퀴즈 데이터 (10문제)
    const quizData = [
        { choseong: "ㅊㄱ", answer: "축구" },
        { choseong: "ㄴㄱ", answer: "농구" },
        { choseong: "ㅂㄱ", answer: "배구" },
        { choseong: "ㅇㄱ", answer: "야구" },
        { choseong: "ㅅㅇ", answer: "수영" },
        { choseong: "ㅌㄱ", answer: "탁구" },
        { choseong: "ㅌㄴㅅ", answer: "테니스" },
        { choseong: "ㅂㄷㅁㅌ", answer: "배드민턴" },
        { choseong: "ㅇㄱ", answer: "양궁" },
        { choseong: "ㅁㄹㅌ", answer: "마라톤" }
    ];

    let currentIdx = 0;
    let score = 0;

    // 전역 함수 연결 (type="module" 대응)
    window.startGame = () => {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    };

    function showQuestion() {
        if (currentIdx < quizData.length) {
            document.getElementById('progress').innerText = `${currentIdx + 1}/${quizData.length}`;
            document.getElementById('choseong-display').innerText = quizData[currentIdx].choseong;
            const input = document.getElementById('answer-input');
            input.value = '';
            input.className = '';
            input.focus();
            document.getElementById('feedback-msg').innerText = '';
        } else {
            showResult();
        }
    }

    window.checkAnswer = () => {
        const input = document.getElementById('answer-input');
        const feedback = document.getElementById('feedback-msg');
        const userAnswer = input.value.trim();

        if (!userAnswer) return;

        if (userAnswer === quizData[currentIdx].answer) {
            score += 10;
            input.classList.add('correct');
            feedback.innerText = "정답입니다! (+10)";
            feedback.style.color = "var(--success-color)";
        } else {
            input.classList.add('wrong');
            feedback.innerText = `오답! 정답은 [${quizData[currentIdx].answer}]`;
            feedback.style.color = "var(--error-color)";
        }

        document.getElementById('current-score').innerText = `점수: ${score}`;
        currentIdx++;
        
        // 1.2초 후 다음 문제로
        setTimeout(showQuestion, 1200);
    };

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }

    window.saveScore = async () => {
        const nickname = document.getElementById('nickname-input').value.trim();
        if (!nickname) {
            alert("닉네임을 입력해주세요!");
            return;
        }

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerText = "저장 중...";

        try {
            await addDoc(collection(db, "scores"), {
                nickname: nickname,
                score: score,
                timestamp: serverTimestamp()
            });
            showRanking();
        } catch (e) {
            console.error("Error: ", e);
            alert("점수 저장에 실패했습니다. Firestore 규칙을 확인하세요.");
            btn.disabled = false;
            btn.innerText = "점수 저장 및 랭킹 보기";
        }
    };

    async function showRanking() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('ranking-screen').classList.remove('hidden');
        const board = document.getElementById('ranking-board');
        board.innerHTML = "랭킹 불러오는 중...";

        try {
            const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(5));
            const querySnapshot = await getDocs(q);
            
            board.innerHTML = "";
            let rank = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'ranking-item';
                div.innerHTML = `<span>${rank}. ${data.nickname}</span> <span>${data.score}점</span>`;
                board.appendChild(div);
                rank++;
            });
            if(rank === 1) board.innerHTML = "등록된 점수가 없습니다.";
        } catch (e) {
            board.innerHTML = "랭킹을 불러올 수 없습니다.";
        }
    }

    // 엔터키 처리
    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>
</body>
</html>
